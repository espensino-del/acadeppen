<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mapas Mentais</title>

<style>

:root{
 --bg:#000;
 --fg:#fff;
 --gold:#d9a900;
 --card:#232323;
}

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
}

body{
 background:var(--bg);
 color:var(--fg);
 font-family:Arial,sans-serif;
}

header{
 background:#fff;
 border-bottom:4px solid var(--gold);
 padding:20px 10px;
 text-align:center;
 header h2{font-size:1.25rem;margin-top:8px}
 }

header img{
    width:260px;
    max-width:90%;
    padding-bottom:20px;
    height:auto;
    display:block;
    margin:auto;
}


header h2{
 color:#000;
}

.topbar{
 padding:15px;
 text-align:center;
}

.btn{
 background:var(--gold);
 color:#000;
 text-decoration:none;
 padding:10px 20px;
 border-radius:30px;
 font-weight:bold;
 display:inline-block;
}

.container{
 max-width:1000px;
 margin:auto;
 padding:30px;
}

.lista{
 display:grid;
 gap:15px;
}

.item{
 background:var(--card);
 border-left:4px solid var(--gold);
 padding:18px;
 border-radius:10px;
 text-decoration:none;
 color:white;
 transition:.3s;
}

.item:hover{
 transform:translateX(5px);
}

</style>
</head>

<body>

<header>
<img src="https://esp.susepe.rs.gov.br/ead/pluginfile.php/1/theme_klass/logo/1771954056/topEaD_PP_.png" alt="Logo">

</header>

</div>

</div>

</div>

</body>
</html>
