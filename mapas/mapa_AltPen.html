<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Mapa Mental - Alternativas Penais</title>
<style>
:root{
 --bg:#000; --fg:#fff; --gold:#d9a900;
 --box:#232323; --line:#bfc7ff;
 --panel:#111;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);font-family:Arial,sans-serif;overflow:hidden}
body{display:flex;flex-direction:column}
header{background:#fff;text-align:center;padding:10px;border-bottom:3px solid var(--gold);flex:0 0 auto}
header img{max-width:260px;width:90%}
header h2{margin:10px 0 0 0;color:#000;text-align:center;font-size:1.8rem;font-weight:700;line-height:1.2}
.toolbar{
 display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;
 padding:12px;background:var(--panel);position:sticky;top:0;z-index:10;flex:0 0 auto
}
button{
 background:var(--gold);border:none;padding:10px 16px;border-radius:20px;
 font-weight:bold;cursor:pointer;color:#111
}
button:active{transform:translateY(1px)}
.zoom-group{display:flex;gap:8px;align-items:center}
#zoomLabel{
 min-width:64px;text-align:center;font-weight:700;color:#fff;
 padding:6px 10px;border:1px solid rgba(255,255,255,.18);border-radius:999px;background:#1a1a1a
}
#wrap{
 position:relative;flex:1 1 auto;overflow:auto;background:#0b0b0b;
 touch-action:none;-webkit-overflow-scrolling:touch
}
#stage{position:relative;width:2000px;height:1700px}
#canvas{
 position:absolute;inset:0;transform-origin:0 0;will-change:transform
}
svg{position:absolute;inset:0;overflow:visible;pointer-events:none}
.node{
 position:absolute;background:var(--box);color:#fff;
 border-radius:14px;padding:10px 14px;min-width:180px;
 box-shadow:0 0 0 1px rgba(255,255,255,.08);
 transition:all .25s ease;cursor:pointer;z-index:2
}
.root{background:#333;border:2px solid var(--gold);font-weight:700}
.leaf{cursor:default;min-width:260px}
.hidden{opacity:0;transform:scale(.9);pointer-events:none}
path{stroke:var(--line);stroke-width:2;fill:none;transition:opacity .25s}
.hiddenLine{opacity:0}
circle{fill:var(--gold)}

@media (max-width: 768px){
 header{padding:8px 8px 10px}
 header img{max-width:190px;width:82%}
 header h1{font-size:1.25rem;margin-top:8px}
 .toolbar{padding:10px 8px;gap:8px}
 button{padding:9px 12px;font-size:.92rem}
 #zoomLabel{min-width:58px;padding:5px 8px;font-size:.9rem}
 #stage{width:2000px;height:1700px}
 .node{min-width:160px;padding:9px 12px;font-size:.92rem}
 .leaf{min-width:235px}
}

.topbar{
 padding:15px;
 text-align:center;
}

</style>
</head>
<body>
<header>
<img src="https://esp.susepe.rs.gov.br/ead/pluginfile.php/1/theme_klass/logo/1771954056/topEaD_PP_.png" alt="Logo">
<h2>Mapa mental - Alternativas Penais</h2>
</header>

<div class="topbar">
<button onclick="location.href='../mapas.html'">Menu</button>
</div>
<div class="toolbar">
  <button type="button" onclick="expandAll()">Expandir tudo</button>
  <button type="button" onclick="collapseAll()">Recolher tudo</button>
  <div class="zoom-group">
    <button type="button" id="zoomOut" aria-label="Diminuir zoom">−</button>
    <span id="zoomLabel">85%</span>
    <button type="button" id="zoomIn" aria-label="Aumentar zoom">+</button>
  </div>
</div>

<div id="wrap">
  <div id="stage">
    <div id="canvas">
      <svg id="svg"></svg>
    </div>
  </div>
</div>

<script>
const data=[
["Conceito e Diretrizes",["Resolução 288/2019 CNJ","Intervenção em conflitos sem encarceramento","Restauração de relações e cultura da paz","Responsabilização com dignidade e liberdade","Redução da taxa de encarceramento"]],
["Modalidades de Aplicação",["Penas restritivas de direitos","Transação penal e suspensão do processo","Suspensão condicional da pena","Justiça restaurativa e mediação","Medidas cautelares diversas da prisão","Medidas protetivas de urgência"]],
["Espécies de Penas (Art. 32 CP)",["Privativa de Liberdade","Multa (Art. 49 CP)","Restritiva de Direitos"]],
["Medidas Cautelares (Art. 319 CPP)",["Critérios: Necessidade e Adequação","Comparecimento em juízo","Proibição de frequência a lugares","Proibição de contato e saída da comarca","Recolhimento domiciliar","Monitoração eletrônica","Fiança","Internação provisória"]],
["Regimes de Cumprimento",["Fechado: Segurança máxima ou média","Semiaberto: Colônia agrícola ou industrial","Aberto: Casa de albergado"]],
["Marco Histórico e Legislativo",["Regras de Tóquio (ONU 1990)","Lei 9.099/95 (JECRIM)","Lei 9.714/98 (Penas Alternativas)","Lei 11.340/06 (Maria da Penha)","Lei 12.403/11 (Medidas Cautelares)","Plano Pena Justa (2025)"]],
["Estrutura Institucional",["CIAPs (Acompanhamento)","Audiência de Custódia","NUGESP","Escritórios Sociais","Vara das Garantias"]]
];

const BASE_W = 2000;
const BASE_H = 1700;
const MIN_SCALE = 0.35;
const MAX_SCALE = 1.8;
const STEP = 0.12;

const stage = document.getElementById('stage');
const canvas = document.getElementById('canvas');
const svg = document.getElementById('svg');
const wrap = document.getElementById('wrap');
const zoomLabel = document.getElementById('zoomLabel');

const groups = [];
let scale = window.innerWidth <= 768 ? 0.55 : 0.85;
let pinchStartScale = scale;
let pinchStartDistance = 0;
let pinchCenterX = 0;
let pinchCenterY = 0;
let dragStartX = 0;
let dragStartY = 0;
let dragScrollLeft = 0;
let dragScrollTop = 0;
let dragging = false;
let pinching = false;

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function updateZoomLabel() {
  zoomLabel.textContent = Math.round(scale * 100) + '%';
}

function applyScale(nextScale, focalX = wrap.clientWidth / 2, focalY = wrap.clientHeight / 2) {
  const bounded = clamp(nextScale, MIN_SCALE, MAX_SCALE);
  const oldScale = scale;
  const scrollLeft = wrap.scrollLeft;
  const scrollTop = wrap.scrollTop;

  const contentX = (scrollLeft + focalX) / oldScale;
  const contentY = (scrollTop + focalY) / oldScale;

  scale = bounded;
  stage.style.width = (BASE_W * scale) + 'px';
  stage.style.height = (BASE_H * scale) + 'px';
  canvas.style.transform = `scale(${scale})`;

  const newScrollLeft = contentX * scale - focalX;
  const newScrollTop = contentY * scale - focalY;
  wrap.scrollLeft = Math.max(0, newScrollLeft);
  wrap.scrollTop = Math.max(0, newScrollTop);

  updateZoomLabel();
}

function getRelativePoint(touch) {
  const rect = wrap.getBoundingClientRect();
  return {
    x: touch.clientX - rect.left + wrap.scrollLeft,
    y: touch.clientY - rect.top + wrap.scrollTop
  };
}

function distance(t1, t2) {
  return Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
}

function div(txt, x, y, cls) {
  const d = document.createElement('div');
  d.className = 'node ' + cls;
  d.textContent = txt;
  d.style.left = x + 'px';
  d.style.top = y + 'px';
  canvas.appendChild(d);
  return d;
}

function path(x1, y1, x2, y2) {
  const p = document.createElementNS("http://www.w3.org/2000/svg", 'path');
  const dx = (x2 - x1) * 0.45;
  p.setAttribute('d', `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`);
  svg.appendChild(p);
  return p;
}

function dot(x, y) {
  const o = document.createElementNS("http://www.w3.org/2000/svg", 'circle');
  o.setAttribute('cx', x);
  o.setAttribute('cy', y);
  o.setAttribute('r', 4);
  svg.appendChild(o);
  return o;
}

div("Alternativas Penais", 30, 700, "root");
const rx = 210, ry = 725;

let y = 40;
data.forEach(g => {
  const p = div(g[0], 260, y, "");
  const py = y + 22;

  path(rx, ry, 260, py);
  dot(260, py);

  const leaves = [];
  const lines = [];
  const dots = [];
  let ly = y - 10;

  g[1].forEach(t => {
    const n = div(t, 560, ly, "leaf hidden");
    const l = path(430, py, 560, ly + 22);
    l.classList.add('hiddenLine');
    const d = dot(430, py);
    d.classList.add('hiddenLine');

    leaves.push(n);
    lines.push(l);
    dots.push(d);
    ly += 60;
  });

  p.open = false;
  p.onclick = () => {
    p.open = !p.open;
    leaves.forEach(n => n.classList.toggle('hidden', !p.open));
    lines.forEach(n => n.classList.toggle('hiddenLine', !p.open));
    dots.forEach(n => n.classList.toggle('hiddenLine', !p.open));
  };

  groups.push({ p, leaves, lines, dots });
  y += Math.max(220, g[1].length * 60 + 60);
});

svg.setAttribute('width', BASE_W);
svg.setAttribute('height', BASE_H);

function expandAll() {
  groups.forEach(g => {
    g.p.open = true;
    g.leaves.forEach(n => n.classList.remove('hidden'));
    g.lines.forEach(n => n.classList.remove('hiddenLine'));
    g.dots.forEach(n => n.classList.remove('hiddenLine'));
  });
}

function collapseAll() {
  groups.forEach(g => {
    g.p.open = false;
    g.leaves.forEach(n => n.classList.add('hidden'));
    g.lines.forEach(n => n.classList.add('hiddenLine'));
    g.dots.forEach(n => n.classList.add('hiddenLine'));
  });
}

function zoomBy(delta, cx = wrap.clientWidth / 2, cy = wrap.clientHeight / 2) {
  applyScale(scale + delta, cx, cy);
}

document.getElementById('zoomIn').addEventListener('click', () => zoomBy(STEP));
document.getElementById('zoomOut').addEventListener('click', () => zoomBy(-STEP));

wrap.addEventListener('touchstart', (event) => {
  if (event.touches.length === 1) {
    dragging = true;
    pinching = false;
    const t = event.touches[0];
    dragStartX = t.clientX;
    dragStartY = t.clientY;
    dragScrollLeft = wrap.scrollLeft;
    dragScrollTop = wrap.scrollTop;
  } else if (event.touches.length === 2) {
    pinching = true;
    dragging = false;
    pinchStartScale = scale;
    pinchStartDistance = distance(event.touches[0], event.touches[1]);
    const rect = wrap.getBoundingClientRect();
    pinchCenterX = ((event.touches[0].clientX + event.touches[1].clientX) / 2) - rect.left;
    pinchCenterY = ((event.touches[0].clientY + event.touches[1].clientY) / 2) - rect.top;
  }
}, { passive: false });

wrap.addEventListener('touchmove', (event) => {
  if (event.touches.length === 2 && pinching) {
    event.preventDefault();
    const newDistance = distance(event.touches[0], event.touches[1]);
    if (pinchStartDistance > 0) {
      const nextScale = pinchStartScale * (newDistance / pinchStartDistance);
      applyScale(nextScale, pinchCenterX, pinchCenterY);
    }
  } else if (event.touches.length === 1 && dragging && !pinching) {
    event.preventDefault();
    const t = event.touches[0];
    const dx = t.clientX - dragStartX;
    const dy = t.clientY - dragStartY;
    wrap.scrollLeft = dragScrollLeft - dx;
    wrap.scrollTop = dragScrollTop - dy;
  }
}, { passive: false });

wrap.addEventListener('touchend', (event) => {
  if (event.touches.length < 2) {
    pinching = false;
  }
  if (event.touches.length === 0) {
    dragging = false;
  }
});

window.addEventListener('resize', () => {
  if (window.innerWidth <= 768 && scale > 1.2) {
    applyScale(0.55);
  }
});

window.expandAll = expandAll;
window.collapseAll = collapseAll;

applyScale(scale);
updateZoomLabel();
</script>
</body>
</html>
